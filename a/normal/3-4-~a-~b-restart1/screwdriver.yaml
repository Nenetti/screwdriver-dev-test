# ----------------------------------------------------------------------------------------------------------------------
#
#   Shared
#
# ----------------------------------------------------------------------------------------------------------------------
shared:
  image: bitnami/git:latest
  annotations:
    failure:
      steps: &failure_steps
        - failure: exit 1
  steps:
    - test: echo 'test'

parameters:
  restart_all: ["false", "true"]

# ----------------------------------------------------------------------------------------------------------------------
#
#   Jobs
#
# ----------------------------------------------------------------------------------------------------------------------
jobs:
  hub:
    requires: [ ~commit, ~pr ]
  a:
    requires: [ ~hub ]
  b:
    requires: [ ~hub ]
    steps: *failure_steps
  target:
    requires: [ ~a, ~b ]
shared:
  image: bitnami/git:latest
  steps:
    - test: echo 'test'

jobs:
  A-success:
    requires: [ ~commit, ~pr ]
    annotations:
      screwdriver.cd/displayName: "A○"

  A-failure:
    requires: [ ~commit, ~pr ]
    annotations:
      screwdriver.cd/displayName: "A×"
    steps: &failure-steps
      - meta: |
          if [ "$(meta get restart)" -ne '1' ]; then
            meta set restart '1'
            exit 1
          fi
